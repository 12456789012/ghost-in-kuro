    <!-- Style du site -->
    <style>.logo img {
    height: 50px;
    width: auto;
}
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: #f5f5f5;
        }
nav a {
    color: #f5f5f5;
    text-decoration: none;
    margin-left: 20px;
    font-weight: 500;
    transition: 0.3s;
}

/* effet hover */
nav a:hover {
    color: #888;
}

/* ⭐ lien actif */
nav a.active {
    color: #fff;
    border-bottom: 2px solid #fff;
    padding-bottom: 4px;
}
/* Conteneur du texte principal */
.hero {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: url("images/hero1.jpg") center/cover no-repeat;
}

/* Boîte avec effet verre sombre */
.hero-content {
    background: rgba(0, 0, 0, 0.6);
    padding: 25px 45px;
    border-radius: 12px;
    backdrop-filter: blur(4px);
}

/* Titre principal */
.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    margin: 0;
    letter-spacing: 3px;
    text-shadow:
        0 0 5px rgba(255, 255, 255, 0.6),
        0 0 15px rgba(255, 255, 255, 0.4);
}

/* Sous-titre stylisé */
.subtitle {
    margin-top: 12px;
    font-family: 'Montserrat', sans-serif;
    font-size: 1.6rem; /* plus grand */
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #e0e0e0;
    text-shadow: 0 0 8px rgba(255, 255, 255, 0.35);
    opacity: 0.9;
}
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background-color: #000;
            border-bottom: 1px solid #222;
        }
nav a {
    position: relative;
    color: #f5f5f5;
    text-decoration: none;
    margin-left: 20px;
    font-weight: 500;
    letter-spacing: 1px;
    transition: 0.3s ease;
}

/* effet hover glow */
nav a:hover {
    color: #fff;
    text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
}

/* underline animé */
nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0%;
    height: 1px;
    background: #fff;
    box-shadow: 0 0 8px rgba(255,255,255,0.6);
    transition: width 0.3s ease;
}

nav a:hover::after {
    width: 100%;
}

/* lien actif (page actuelle) */
nav a.active {
    color: #fff;
    text-shadow: 0 0 10px rgba(255,255,255,0.8);
}

nav a.active::after {
    width: 100%;
}
        .logo {

        }

            padding: 20px 40px;
            border-radius: 10px;
        }

        footer {

            padding: 20px;
            background: #000;
            border-top: 1px solid #222;
        }
